name: s256_web_wallet
description: Simple S256 coin web wallet - Load, Send, Receive
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter

  # Core crypto libraries (web compatible)
  pointycastle: ^3.9.1
  crypto: ^3.0.7
  bech32: ^0.2.2
  bip32: ^2.0.0
  bip39: ^1.0.6
  http: ^1.2.2
  hex: ^0.2.0
  base_x: ^2.0.1

  # State management
  provider: ^6.1.5+1

  # UI
  qr_flutter: ^4.1.0

  # Utils
  intl: ^0.20.2
  web: ^1.1.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_btcs.png
    - assets/icons/
    
flutter_launcher_icons:
  image_path: "assets/logo.png"
  image_path_android: "assets/logo.png"
  image_path_ios: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0A0A0A"
