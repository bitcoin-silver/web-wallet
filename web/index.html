<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BitcoinSilver Web Wallet - Simple, secure, decentralized">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BitcoinSilver Web Wallet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Basic OG tags (required for Discord/Twitter/Facebook) -->
  <meta property="og:title" content="BitcoinSilver Web Wallet " />
  <meta property="og:description" content="BitcoinSilver Web Wallet - Simple, secure, decentralized" />
  <meta property="og:image"
    content="https://raw.githubusercontent.com/bitcoin-silver/web-wallet/main/assets/og_image.png" />
  <meta property="og:url" content="https://bitcoinsilver.top/" />
  <meta property="og:type" content="website" />

  <!-- Twitter/X card (also used by some other platforms) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BitcoinSilver Web Wallet" />
  <meta name="twitter:description" content="BitcoinSilver Web Wallet - Simple, secure, decentralized" />
  <meta name="twitter:image"
    content="https://raw.githubusercontent.com/bitcoin-silver/web-wallet/main/assets/og_image.png" />

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://bitcoinsilver.top https://explorer.bitcoinsilver.top https://btcs-vps13.duckdns.org https://www.gstatic.com https://fonts.gstatic.com https://fonts.googleapis.com https://api.livecoinwatch.com; base-uri 'self'; form-action 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>BitcoinSilver Web-Wallet</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background: #0A0A0A;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .spinner {
      border: 4px solid #1A1A1A;
      border-top: 4px solid #C0C0C0;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="loading">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #C0C0C0;">Loading Bitcoin Silver Web-Wallet...</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
