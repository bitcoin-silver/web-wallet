name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create dart_defines.json
        run: |
          cat > dart_defines.json << 'EOF'
          {
            "LIVECOINWATCH_API_KEY": "${{ secrets.LIVECOINWATCH_API_KEY }}",
            "SESSION_ENCRYPTION_SECRET_HEX": "${{ secrets.SESSION_ENCRYPTION_SECRET_HEX }}"
          }
          EOF

      - name: Build web
        run: flutter build web --release --base-href "/web-wallet/" --dart-define-from-file=dart_defines.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
